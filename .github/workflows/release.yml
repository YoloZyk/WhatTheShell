name: Release

on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release@v2 needs contents:write to create the
# GitHub Release for the pushed tag. Default GITHUB_TOKEN is read-only
# since GitHub's 2023 permission tightening; declare here so the
# workflow doesn't depend on the repo's "Workflow permissions" setting
# (which defaults to read-only on fresh repos).
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Extract the README ## Changelog section for ${GITHUB_REF_NAME}
      # (e.g. v0.4.2). Stops at the next "### v" heading. If no matching
      # section exists, release body is left empty (with a warning).
      - name: Extract changelog section for this tag
        run: |
          awk -v tag="${GITHUB_REF_NAME}" '
            $0 ~ "^### " tag "($| )" { found=1; next }
            found && /^### v/         { exit }
            found                     { print }
          ' README.md > release_body.md

          if [ ! -s release_body.md ]; then
            echo "::warning::No '### ${GITHUB_REF_NAME}' section found in README.md; release body will be empty."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
