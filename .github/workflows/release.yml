name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            artifact: wts-win.exe
          - os: macos-latest
            target: node18-macos-x64
            artifact: wts-macos
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: wts-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build binary
        run: pkg dist/index.js --target ${{ matrix.target }} --output ${{ matrix.artifact }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
